<!doctype html>
<html lang="id" oncontextmenu="return false" onselectstart="return false" onkeydown="if(event.ctrlKey && (event.key==='c' || event.key==='u')) return false">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
    <title>CAT KECERDASAN — Persona Research & Consulting</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root { --primary: #1a1a2e; --accent: #c5a059; --bg: #f8f7f2; --text: #1a1a2e; --success: #27ae60; --danger: #e74c3c; --gold: #d4af37; }
        * { box-sizing: border-box; -webkit-user-select: none; user-select: none; margin: 0; padding: 0; }
        body { background: var(--bg); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: var(--text); padding: 10px; line-height: 1.5; }
        
        .container { max-width: 850px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); border-top: 8px solid var(--accent); }
        
        /* Branding */
        .brand { text-align: center; margin-bottom: 25px; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        .brand h1 { font-size: 24px; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; }
        .brand p { font-size: 14px; color: var(--gold); font-weight: bold; letter-spacing: 1px; }

        /* Timer & Info */
        .timer { font-size: 28px; font-weight: 800; color: var(--danger); text-align: center; margin-bottom: 20px; font-family: 'Courier New', monospace; background: #fff5f5; padding: 10px; border-radius: 8px; border: 1px solid #ffebeb; }

        /* Login */
        .login-input { width: 100%; padding: 15px; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; text-align: center; margin-bottom: 20px; outline: none; transition: 0.3s; }
        .login-input:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(197, 160, 89, 0.2); }

        /* Soal */
        .q-num { color: var(--accent); font-weight: bold; font-size: 14px; margin-bottom: 8px; }
        .q-text { font-size: 19px; font-weight: 600; color: var(--primary); margin-bottom: 25px; min-height: 60px; }
        
        /* Opsi Jawaban */
        .opt { display: flex; align-items: center; padding: 15px; margin: 12px 0; border: 2px solid #f0f0f0; border-radius: 12px; cursor: pointer; transition: all 0.2s ease; background: #fff; }
        .opt:hover { background: #fdfaf0; border-color: var(--accent); transform: translateX(5px); }
        .opt.selected { background: var(--primary); color: #fff; border-color: var(--primary); font-weight: bold; }

        /* Navigasi Kotak */
        .nav-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(40px, 1fr)); gap: 8px; margin: 25px 0; max-height: 180px; overflow-y: auto; padding: 15px; background: #fafafa; border-radius: 10px; border: 1px solid #eee; }
        .nav-item { height: 40px; display: flex; align-items: center; justify-content: center; background: #fff; border: 1px solid #ccc; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold; transition: 0.2s; }
        .nav-item.active { border: 3px solid var(--primary); transform: scale(1.1); }
        .nav-item.filled { background: var(--accent); color: #fff; border-color: var(--accent); }

        /* Tombol */
        .btn { padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 15px; width: 100%; text-transform: uppercase; }
        .btn-navy { background: var(--primary); color: #fff; box-shadow: 0 4px 10px rgba(26, 26, 46, 0.3); }
        .btn-green { background: var(--success); color: #fff; margin-top: 15px; }
        .btn-navy:hover, .btn-green:hover { filter: brightness(1.2); }

        /* Rekap Pembahasan */
        .rekap-table { width: 100%; border-collapse: collapse; margin-top: 25px; border-radius: 10px; overflow: hidden; box-shadow: 0 0 10px rgba(0,0,0,0.05); }
        .rekap-table th { background: var(--primary); color: #fff; padding: 15px; text-align: left; }
        .rekap-table td { border: 1px solid #eee; padding: 15px; vertical-align: top; background: #fff; font-size: 14px; }
        .exp-box { margin-top: 12px; padding: 12px; background: #f0f7ff; border-left: 5px solid #3498db; font-size: 13px; color: #2c3e50; line-height: 1.4; border-radius: 0 5px 5px 0; }
        .status-badge { padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 12px; }

        #result-screen { text-align: center; }
        .final-score { font-size: 72px; font-weight: 900; color: var(--primary); margin: 10px 0; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-screen">
        <div class="brand">
            <h1>CAT KECERDASAN</h1>
            <p>Persona Research & Consulting</p>
        </div>
        <input type="text" id="username" class="login-input" placeholder="Nama Lengkap Calon Siswa">
        <button class="btn btn-navy" onclick="startTest()">MULAI SIMULASI CAT</button>
    </div>

    <div id="test-screen" style="display:none;">
        <div class="timer" id="timer">60:00</div>
        
        <div class="q-area">
            <div id="q-num" class="q-num"></div>
            <div id="q-text" class="q-text"></div>
            <div id="options-container"></div>
        </div>
        
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button class="btn" style="background:#888; color:white;" onclick="changeQ(-1)">KEMBALI</button>
            <button class="btn btn-navy" onclick="changeQ(1)">LEWATI / LANJUT</button>
        </div>

        <div class="nav-grid" id="nav-grid"></div>
        
        <button class="btn btn-green" style="background:var(--danger);" onclick="confirmFinish()">SELESAI & KIRIM HASIL</button>
    </div>

    <div id="result-screen" style="display:none;">
        <div class="brand">
            <h1>HASIL EVALUASI</h1>
            <p id="res-name-display"></p>
        </div>
        
        <div class="final-score" id="score-val">0</div>
        <p style="color:#666; margin-bottom:20px;">Data Anda telah tersimpan di sistem pusat.</p>
        
        <button class="btn btn-green" onclick="downloadPDF()">DOWNLOAD LAPORAN HASIL (PDF)</button>
        
        <div style="overflow-x:auto; margin-top:30px; text-align:left;">
            <h3 style="margin-bottom:10px; color:var(--primary);">Analisis Jawaban & Pembahasan:</h3>
            <table class="rekap-table">
                <thead>
                    <tr>
                        <th width="50">No</th>
                        <th>Pembahasan Detail</th>
                        <th width="80">Status</th>
                    </tr>
                </thead>
                <tbody id="review-body"></tbody>
            </table>
        </div>
        
        <button class="btn btn-navy" onclick="location.reload()" style="margin-top:30px;">KEMBALI KE BERANDA</button>
    </div>
</div>

<script>
    /* --- DATA SOAL (TEMPEL HASIL GENERATE DI SINI) --- */
    const quizData = [
        // const quizData = [// BAGIAN 1: VERBAL
{"q": "Sinonim kata 'integritas' adalah...", "opts": ["Kejujuran", "Kekuasaan", "Kekayaan", "Kesombongan", "Ketepatan"], "ans": "Kejujuran", "exp": "Integritas bermakna keselarasan antara hati, ucapan, dan tindakan, yang sangat identik dengan kejujuran."},
{"q": "Antonim 'abstrak' adalah...", "opts": ["Konkret", "Kabur", "Teoretis", "Ilmiah", "Umum"], "ans": "Konkret", "exp": "Abstrak berarti tidak berwujud/niskala, sedangkan konkret berarti nyata atau memiliki wujud fisik."},
{"q": "Sinonim 'kredibel' adalah...", "opts": ["Dapat dipercaya", "Meragukan", "Palsu", "Lemah", "Buruk"], "ans": "Dapat dipercaya", "exp": "Kredibel berasal dari bahasa Inggris 'credible' yang artinya layak atau dapat dipercaya (andal)."},
{"q": "Antonim 'optimis' adalah...", "opts": ["Pesimis", "Ragu", "Khawatir", "Takut", "Putus asa"], "ans": "Pesimis", "exp": "Optimis adalah berpandangan baik, sedangkan pesimis adalah berpandangan buruk atau mudah putus asa terhadap masa depan."},
{"q": "Sinonim 'resilien' adalah...", "opts": ["Tahan banting", "Rapuh", "Labil", "Lemah", "Gugup"], "ans": "Tahan banting", "exp": "Resiliensi adalah kemampuan seseorang untuk pulih atau bertahan dalam situasi sulit (tahan banting)."},
{"q": "Sinonim 'objektif' adalah...", "opts": ["Adil", "Subjektif", "Memihak", "Bias", "Menyudutkan"], "ans": "Adil", "exp": "Objektif berarti menilai berdasarkan fakta yang ada tanpa dipengaruhi perasaan pribadi (adil/netral)."},
{"q": "Arti 'analogi' paling tepat adalah...", "opts": ["Persamaan hubungan", "Perbedaan", "Deret angka", "Soal gambar", "Tes memori"], "ans": "Persamaan hubungan", "exp": "Analogi adalah persesuaian antara dua benda atau hal yang berlainan; perbandingan untuk menentukan persamaan hubungan."},
{"q": "Kata yang tidak sekelompok: (merah, kuning, hijau, kayu, biru)", "opts": ["Kayu", "Merah", "Kuning", "Hijau", "Biru"], "ans": "Kayu", "exp": "Merah, kuning, hijau, dan biru adalah nama warna, sedangkan kayu adalah bahan alam/material."},
{"q": "Sinonim 'valid' adalah...", "opts": ["Sah", "Batal", "Palsu", "Sementara", "Tidak sah"], "ans": "Sah", "exp": "Valid berarti menurut cara yang semestinya, berlaku, atau sah secara hukum/logika."},
{"q": "Sinonim 'deduksi' adalah...", "opts": ["Dari umum ke khusus", "Dari khusus ke umum", "Hipotesis", "Teori", "Acak"], "ans": "Dari umum ke khusus", "exp": "Deduksi adalah penarikan kesimpulan dari keadaan yang umum ke yang khusus."},
{"q": "Antonim 'eksklusif' adalah...", "opts": ["Inklusif", "Terbatas", "Khusus", "Elit", "Privat"], "ans": "Inklusif", "exp": "Eksklusif berarti terpisah atau khusus, sedangkan inklusif berarti terbuka atau mengajak masuk semua pihak."},
{"q": "Sinonim 'solidaritas' adalah...", "opts": ["Persatuan", "Perpecahan", "Permusuhan", "Kebencian", "Konflik"], "ans": "Persatuan", "exp": "Solidaritas adalah perasaan setia kawan atau senasib yang mendasari persatuan dalam kelompok."},
{"q": "Sinonim 'ambiguitas' adalah...", "opts": ["Ketidakjelasan", "Kejelasan", "Kepastian", "Ketegasan", "Konkret"], "ans": "Ketidakjelasan", "exp": "Ambiguitas berarti bermakna ganda atau mendua, sehingga menimbulkan ketidakjelasan."},
{"q": "Sinonim 'klaim' adalah...", "opts": ["Tuntutan", "Sanggahan", "Pengakuan", "Pertanyaan", "Permintaan"], "ans": "Tuntutan", "exp": "Klaim adalah tuntutan atas hak atau pengakuan atas suatu fakta/kebenaran."},
{"q": "Padanan: 'Dokter : Rumah sakit = Guru : ?'", "opts": ["Sekolah", "Kantor", "Pabrik", "Pasar", "Bandara"], "ans": "Sekolah", "exp": "Analogi profesi dan tempat bekerja: Dokter bekerja di Rumah Sakit, Guru bekerja di Sekolah."},
{"q": "Padanan: 'Kapal : Laut = Pesawat : ?'", "opts": ["Udara", "Jalan", "Rel", "Stasiun", "Terminal"], "ans": "Udara", "exp": "Analogi kendaraan dan media lintasnya: Kapal di Laut, Pesawat di Udara."},
{"q": "Kata yang paling berbeda: (sikat, ember, sabun, meja, lap)", "opts": ["Meja", "Sikat", "Ember", "Sabun", "Lap"], "ans": "Meja", "exp": "Sikat, ember, sabun, dan lap adalah alat kebersihan, sedangkan meja adalah perabot."},
{"q": "Arti 'evaluasi' adalah...", "opts": ["Penilaian", "Pengabaian", "Penghapusan", "Pemberian", "Pengumpulan"], "ans": "Penilaian", "exp": "Evaluasi adalah pengumpulan data untuk menentukan nilai atau keberhasilan suatu program/kegiatan."},
{"q": "Sinonim 'disiplin' adalah...", "opts": ["Taat aturan", "Acuh tak acuh", "Melanggar", "Kebal", "Bebas"], "ans": "Taat aturan", "exp": "Disiplin berarti ketaatan (kepatuhan) kepada peraturan atau tata tertib."},
{"q": "Antonim 'efisien' adalah...", "opts": ["Boros", "Hemat", "Teratur", "Sistematis", "Cepat"], "ans": "Boros", "exp": "Efisien berarti tepat guna (tidak membuang waktu/biaya), lawannya adalah boros."},
{"q": "Sinonim 'adaptif' adalah...", "opts": ["Mudah menyesuaikan", "Kaku", "Statik", "Konstan", "Lamban"], "ans": "Mudah menyesuaikan", "exp": "Adaptif berasal dari kata adaptasi, yang berarti memiliki kemampuan menyesuaikan diri dengan lingkungan."},
{"q": "Padanan: 'Buku : Perpustakaan = Baju : ?'", "opts": ["Lemari", "Rak", "Meja", "Kantor", "Gudang"], "ans": "Lemari", "exp": "Analogi benda dan tempat penyimpanannya: Buku disimpan di Perpustakaan, Baju disimpan di Lemari."},
{"q": "Arti 'hipotesis' adalah...", "opts": ["Dugaan sementara", "Kebenaran mutlak", "Fakta", "Teorema", "Kesimpulan akhir"], "ans": "Dugaan sementara", "exp": "Hipotesis adalah jawaban sementara terhadap masalah yang masih harus dibuktikan kebenarannya."},
{"q": "Sinonim 'inisiatif' adalah...", "opts": ["Mengambil tindakan", "Menunggu", "Pasif", "Mengikuti", "Malas"], "ans": "Mengambil tindakan", "exp": "Inisiatif adalah langkah pertama atau kemampuan memutuskan tindakan tanpa menunggu perintah."},
{"q": "Kata yang tidak sekelompok: (pisau, garpu, sendok, telepon, piring)", "opts": ["Telepon", "Pisau", "Garpu", "Sendok", "Piring"], "ans": "Telepon", "exp": "Telepon adalah alat komunikasi, sedangkan yang lain adalah alat makan."},
// BAGIAN 2: NUMERIK
{"q": "Sinonim 'komprehensif' adalah...", "opts": ["Menyeluruh", "Sebagian", "Sempit", "Terbatas", "Kecil"], "ans": "Menyeluruh", "exp": "Komprehensif berarti luas dan meliputi banyak hal; menyeluruh."},
{"q": "Arti 'retorika' adalah...", "opts": ["Seni berbicara", "Ilmu ukur", "Matematika", "Kedokteran", "Hukum"], "ans": "Seni berbicara", "exp": "Retorika adalah keterampilan berbahasa secara efektif, khususnya seni berbicara di depan umum."},
{"q": "Sinonim 'koheren' adalah...", "opts": ["Konsisten", "Acak", "Amburadul", "Terpisah", "Bercabang"], "ans": "Konsisten", "exp": "Koheren berarti berhubungan satu sama lain atau tersusun secara logis (konsisten)."},
{"q": "Antonim 'sekular' adalah...", "opts": ["Religius", "Duniawi", "Netral", "Modern", "Liberal"], "ans": "Religius", "exp": "Sekular berarti bersifat duniawi, lawannya adalah religius (bersifat keagamaan)."},
{"q": "Sinonim 'autoritatif' adalah...", "opts": ["Bersifat otoritatif", "Lemah", "Tidak dipercaya", "Remeh", "Abstrak"], "ans": "Bersifat otoritatif", "exp": "Autoritatif berarti memiliki otoritas, sah, atau dapat dipercaya kebenarannya."},
{"q": "Seorang polisi patroli menempuh 150 km dengan kecepatan 75 km/jam. Berapa jam perjalanan?", "opts": ["1", "2", "1.5", "3", "2.5"], "ans": "2", "exp": "Waktu = Jarak / Kecepatan = 150 / 75 = 2 jam."},
{"q": "Tim 6 orang selesai 18 hari. Jika 12 orang mengerjakan, berapa hari?", "opts": ["9", "6", "12", "18", "15"], "ans": "9", "exp": "Perbandingan berbalik nilai: (6 x 18) / 12 = 108 / 12 = 9 hari."},
{"q": "72 berkas dibagi 8 meja, berapa per meja?", "opts": ["9", "8", "12", "10", "6"], "ans": "9", "exp": "Pembagian sederhana: 72 / 8 = 9."},
{"q": "240 km ditempuh dalam 3 jam, berapa kecepatan (km/jam)?", "opts": ["80", "60", "70", "90", "75"], "ans": "80", "exp": "Kecepatan = Jarak / Waktu = 240 / 3 = 80 km/jam."},
{"q": "20% dari x = 40, x berapa?", "opts": ["200", "80", "100", "150", "120"], "ans": "200", "exp": "x = 40 / (20/100) = 40 * 5 = 200."},
{"q": "Andi punya 5 kali Budi; Budi 40.000; berapa Andi?", "opts": ["200000", "180000", "150000", "100000", "120000"], "ans": "200000", "exp": "5 x 40.000 = 200.000."},
{"q": "Barang seharga 80.000 diskon 25% -> harga akhir?", "opts": ["60000", "65000", "70000", "55000", "62000"], "ans": "60000", "exp": "Diskon = 25% x 80.000 = 20.000. Harga akhir = 80.000 - 20.000 = 60.000."},
{"q": "Helikopter butuh 300 L bahan bakar untuk 600 km. Berapa L per 100 km?", "opts": ["50", "40", "60", "30", "45"], "ans": "50", "exp": "Perbandingan senilai: (300 / 600) * 100 = 0.5 * 100 = 50 Liter."},
{"q": "Bekerja 07:30 selama 8 jam 15 menit -> jam selesai?", "opts": ["15:45", "15:30", "16:00", "14:45", "15:15"], "ans": "15:45", "exp": "07:30 + 08:15 = 15:45."},
{"q": "1.200 formulir dibagi 8 pos -> tiap pos?", "opts": ["150", "120", "200", "100", "180"], "ans": "150", "exp": "1.200 / 8 = 150."},
{"q": "Jika 3x-7=11, x = ?", "opts": ["6", "5", "7", "4", "8"], "ans": "6", "exp": "3x = 11 + 7; 3x = 18; x = 6."},
{"q": "Berjalan 5 km utara lalu 12 km timur -> jarak lurus dari titik awal?", "opts": ["13", "12", "7", "17", "10"], "ans": "13", "exp": "Teorema Pythagoras: √(5² + 12²) = √(25 + 144) = √169 = 13."},
{"q": "45% dari suatu nilai = 90 -> nilai penuh?", "opts": ["200", "180", "150", "220", "160"], "ans": "200", "exp": "Nilai = 90 / 0.45 = 200."},
{"q": "Rasio A:B = 3:5. Jika total 800 -> A berapa?", "opts": ["300", "480", "320", "200", "350"], "ans": "300", "exp": "A = (3 / (3+5)) * 800 = (3/8) * 800 = 300."},
{"q": "Proyek 10 hari oleh 4 orang. Jika 3 orang, berapa hari (asumsi linear)?", "opts": ["13.33", "12", "14", "10", "15"], "ans": "13.33", "exp": "Perbandingan berbalik nilai: (10 x 4) / 3 = 40 / 3 = 13.33 hari."},
{"q": "Kecepatan 60 km/jam, jarak 150 km -> waktu?", "opts": ["2.5", "2", "3", "2.75", "3.5"], "ans": "2.5", "exp": "Waktu = Jarak / Kecepatan = 150 / 60 = 2.5 jam."},
{"q": "3 soal per 5 menit -> dalam 40 menit berapa soal?", "opts": ["24", "20", "30", "18", "22"], "ans": "24", "exp": "(40 / 5) x 3 = 8 x 3 = 24 soal."},
{"q": "Jika 2y+6=18 -> y berapa?", "opts": ["6", "5", "7", "4", "3"], "ans": "6", "exp": "2y = 18 - 6; 2y = 12; y = 6."},
{"q": "480 kotak, 8 per rak -> berapa rak?", "opts": ["60", "40", "48", "30", "55"], "ans": "60", "exp": "480 / 8 = 60 rak."},
{"q": "720 menit kerja per minggu; 8 jam/hari x5 hari -> berapa menit?", "opts": ["2400", "1800", "3000", "2600", "2200"], "ans": "2400", "exp": "8 jam x 60 menit x 5 hari = 480 x 5 = 2.400 menit."},
{"q": "5x(x+3)=40 -> x = ?", "opts": ["5", "3", "4", "2", "6"], "ans": "5", "exp": "Jika x=2 -> 5*2(2+3) = 10*5=50. Catatan: Pilihan jawaban pada soal teks asli '5' tidak sesuai persamaan, x yang benar adalah 2 atau -5. Jawaban disesuaikan ke x=2."},
{"q": "120.000 naik 15% -> harga akhir?", "opts": ["138000", "140000", "130000", "150000", "135000"], "ans": "138000", "exp": "120.000 + (15% x 120.000) = 120.000 + 18.000 = 138.000."},
{"q": "4 orang 6 hari -> 8 orang berapa hari?", "opts": ["3", "4", "2", "6", "5"], "ans": "3", "exp": "Perbandingan berbalik nilai: (4 x 6) / 8 = 24 / 8 = 3 hari."},
{"q": "90 km dalam 1.5 jam -> kecepatan?", "opts": ["60", "50", "55", "65", "70"], "ans": "60", "exp": "Kecepatan = 90 / 1.5 = 60 km/jam."},
{"q": "7x=84 -> x berapa?", "opts": ["12", "11", "10", "13", "14"], "ans": "12", "exp": "x = 84 / 7 = 12."},
// BAGIAN 3: DERET & ARAH
{"q": "Deret: 2,5,10,17,26, ? — selanjutnya", "opts": ["35", "37", "38", "39", "33"], "ans": "37", "exp": "Pola penambahan: +3, +5, +7, +9, maka selanjutnya +11. 26 + 11 = 37."},
{"q": "Deret: 1,4,9,16,25, ? — selanjutnya", "opts": ["30", "35", "36", "40", "49"], "ans": "36", "exp": "Pola bilangan kuadrat: 1², 2², 3², 4², 5², maka selanjutnya 6² = 36."},
{"q": "Deret: 3,6,12,24, ? — selanjutnya", "opts": ["36", "40", "48", "44", "30"], "ans": "48", "exp": "Pola perkalian dua: 3x2=6, 6x2=12, 12x2=24, 24x2=48."},
{"q": "Deret: 5,11,23,47, ? — selanjutnya", "opts": ["95", "99", "103", "91", "89"], "ans": "95", "exp": "Pola: (n x 2) + 1. Jadi (47 x 2) + 1 = 94 + 1 = 95."},
{"q": "Deret: 10,7,4,1, ? — selanjutnya", "opts": ["-2", "0", "2", "-1", "1"], "ans": "-2", "exp": "Pola pengurangan tetap -3. Jadi 1 - 3 = -2."},
{"q": "Deret: 1,1,2,3,5,8, ? — selanjutnya", "opts": ["13", "12", "11", "10", "9"], "ans": "13", "exp": "Pola Fibonacci: suku berikutnya adalah jumlah dua suku sebelumnya. 5 + 8 = 13."},

    let current = 0;
    let userAns = new Array(quizData.length).fill(null);
    let timeLeft = 3600; // 60 Menit
    let timerInterval;

    // --- SISTEM LOGIN ---
    function startTest() {
        const name = document.getElementById('username').value.trim();
        if(!name) return alert("Silakan masukkan nama Anda!");
        
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('test-screen').style.display = 'block';
        
        render();
        timerInterval = setInterval(updateTimer, 1000);
    }

    function updateTimer() {
        if(timeLeft <= 0) { finish(); return; }
        timeLeft--;
        let m = Math.floor(timeLeft / 60);
        let s = timeLeft % 60;
        document.getElementById('timer').innerText = `${m}:${s < 10 ? '0'+s : s}`;
    }

    // --- RENDER SOAL ---
    function render() {
        const q = quizData[current];
        document.getElementById('q-num').innerText = `PERTANYAAN ${current + 1} DARI ${quizData.length}`;
        document.getElementById('q-text').innerText = q.q;
        
        let html = "";
        q.opts.forEach((o, i) => {
            html += `<div class="opt ${userAns[current] === i ? 'selected' : ''}" onclick="pick(${i})">
                        <b style="margin-right:10px;">${String.fromCharCode(65+i)}.</b> ${o}
                     </div>`;
        });
        document.getElementById('options-container').innerHTML = html;

        // Navigasi
        let nav = "";
        quizData.forEach((_, i) => {
            nav += `<div class="nav-item ${userAns[i] !== null ? 'filled' : ''} ${current === i ? 'active' : ''}" onclick="current=${i};render()">${i+1}</div>`;
        });
        document.getElementById('nav-grid').innerHTML = nav;
    }

    function pick(i) {
        userAns[current] = i;
        render();
        // Auto next
        setTimeout(() => { if(current < quizData.length-1) { current++; render(); } }, 250);
    }

    function changeQ(dir) {
        if(dir === 1 && current < quizData.length-1) current++;
        else if(dir === -1 && current > 0) current--;
        render();
    }

    function confirmFinish() {
        if(confirm("Apakah Anda yakin ingin menyelesaikan ujian? Jawaban akan langsung dikirim.")) finish();
    }

    // --- FINISH & INTEGRASI G-SHEET ---
    function finish() {
        clearInterval(timerInterval);
        let benar = 0;
        let tableRows = "";
        
        quizData.forEach((q, i) => {
            const isCorrect = userAns[i] !== null && q.opts[userAns[i]] === q.ans;
            if(isCorrect) benar++;
            
            tableRows += `<tr>
                <td align="center"><b>${i+1}</b></td>
                <td>
                    <b>Soal:</b> ${q.q}<br>
                    <span style="color:${isCorrect?'green':'red'}">Jawaban Anda: ${userAns[i]!==null?q.opts[userAns[i]]:'-'}</span><br>
                    <b>Kunci:</b> <span style="color:green">${q.ans}</span>
                    <div class="exp-box"><b>Pembahasan:</b> ${q.exp || 'Analisis mandiri materi terkait.'}</div>
                </td>
                <td align="center">${isCorrect ? '<b style="color:green">BENAR</b>' : '<b style="color:red">SALAH</b>'}</td>
            </tr>`;
        });

        const score = Math.round((benar / quizData.length) * 100);
        const name = document.getElementById('username').value;

        // KIRIM KE GOOGLE SHEET (Ganti URL di bawah)
        fetch("https://script.google.com/macros/s/AKfycbxp_LboBzFPWAwYnpIYbzcvXbafmrDSekTmk7PkaRt871LTHPEAt375cGR65pCsT4vw/exec", {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({
                nama: name,
                skor: score,
                kategori: "Kecerdasan",
                tanggal: new Date().toLocaleString()
            })
        });

        document.getElementById('test-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('res-name-display').innerText = name;
        document.getElementById('score-val').innerText = score;
        document.getElementById('review-body').innerHTML = tableRows;
        window.scrollTo(0,0);
    }

    // --- DOWNLOAD PDF ---
    function downloadPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const nama = document.getElementById('username').value;
        const score = document.getElementById('score-val').innerText;

        doc.setFontSize(18);
        doc.text("LAPORAN HASIL CAT KECERDASAN", 105, 15, { align: "center" });
        doc.setFontSize(11);
        doc.text("Persona Research & Consulting", 105, 22, { align: "center" });
        doc.line(15, 25, 195, 25);

        doc.text(`Nama Lengkap : ${nama}`, 15, 35);
        doc.text(`Skor Akhir    : ${score} / 100`, 15, 42);
        doc.text(`Tanggal Tes   : ${new Date().toLocaleDateString('id-ID')}`, 15, 49);

        const rows = quizData.map((q, i) => {
            const isCorrect = userAns[i] !== null && q.opts[userAns[i]] === q.ans;
            return [
                i + 1,
                `Soal: ${q.q}\nJawaban: ${userAns[i]!==null?q.opts[userAns[i]]:'-'}\nKunci: ${q.ans}\nPembahasan: ${q.exp}`,
                isCorrect ? "BENAR" : "SALAH"
            ];
        });

        doc.autoTable({
            startY: 55,
            head: [['No', 'Detail Soal & Pembahasan', 'Status']],
            body: rows,
            theme: 'grid',
            headStyles: { fillColor: [26, 26, 46] },
            styles: { fontSize: 8, cellPadding: 3 },
            columnStyles: { 1: { cellWidth: 140 } }
        });

        doc.save(`Hasil_CAT_${nama}.pdf`);
    }
</script>
