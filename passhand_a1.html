<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Persona Research & Consulting - Assessment</title>
    <style>
        :root { --navy: #000033; --gold: #D4AF37; --bg: #FDFCF0; --white: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 15px; user-select: none; }
        
        #main-container { width: 100%; max-width: 650px; margin: auto; background: var(--white); border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 8px solid var(--gold); overflow: hidden; margin-bottom: 50px; }
        
        .header { background: var(--navy); color: white; padding: 25px; text-align: center; }
        .header h2 { margin: 0; font-size: 1.3em; text-transform: uppercase; letter-spacing: 1px; }
        .header p { margin: 5px 0 0; font-size: 0.8em; color: var(--gold); font-weight: bold; }

        .content { padding: 20px; }

        /* Navigasi Nomor */
        .nav-container { margin-top: 20px; padding: 15px; background: #f8fafc; border-radius: 12px; border: 1px solid #e2e8f0; }
        .nav-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 6px; }
        .nav-item { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 11px; background: #fff; border: 1px solid #ddd; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .nav-item.active { background: var(--gold); border-color: var(--gold); color: var(--navy); }
        .nav-item.filled { background: var(--navy); color: white; border-color: var(--navy); }

        /* Area Soal */
        .q-card { min-height: 120px; display: flex; align-items: center; justify-content: center; text-align: center; font-weight: 600; font-size: 1.2em; color: var(--navy); margin: 20px 0; line-height: 1.6; padding: 0 10px; }
        .opt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .btn-opt { padding: 20px; border: 2px solid #eee; border-radius: 15px; cursor: pointer; text-align: center; font-weight: bold; font-size: 1.3em; transition: 0.3s; background: #fff; }
        .btn-opt.selected { background: var(--gold); border-color: var(--gold); color: var(--navy); transform: scale(1.05); }

        /* Hasil */
        .res-table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        .res-table th, .res-table td { border: 1px solid #e2e8f0; padding: 12px; text-align: center; font-size: 14px; }
        .res-table th { background: #f1f5f9; color: var(--navy); }
        
        .badge { padding: 20px; border-radius: 12px; font-weight: bold; text-align: center; margin: 20px 0; font-size: 1.2em; border: 2px solid; }
        .ms { background: #e8f5e9; color: #2e7d32; border-color: #2e7d32; }
        .tms { background: #fff3e0; color: #ef6c00; border-color: #ef6c00; }
        .invalid { background: #ffebee; color: #c62828; border-color: #c62828; }

        .interpretasi-box { background: #f1f5f9; padding: 25px; border-radius: 15px; border: 1px solid #ddd; text-align: left; }
        .interpretasi-box h4 { margin-top: 0; color: var(--navy); border-bottom: 2px solid var(--gold); padding-bottom: 8px; margin-bottom: 15px; }
        .interpretasi-box p { font-size: 14px; line-height: 1.7; color: #444; margin-bottom: 15px; text-align: justify; }

        .btn-main { width: 100%; padding: 18px; background: var(--gold); border: none; font-weight: bold; border-radius: 12px; cursor: pointer; color: var(--navy); text-transform: uppercase; margin-top: 15px; font-size: 14px; }
        
        @media print {
            body { background: white; padding: 0; }
            #main-container { box-shadow: none; border: none; max-width: 100%; margin: 0; }
            .btn-main, .nav-container, .header-btns, .opt-grid, #sub-header { display: none !important; }
            .interpretasi-box { background: white !important; border: 1px solid #000; }
        }
    </style>
</head>
<body oncontextmenu="return false">

<div id="main-container">
    <div class="header">
        <h2>Persona Research & Consulting</h2>
        <p id="sub-header">CAT SYSTEM - PASS HAND 1</p>
    </div>

    <div class="content">
        <div id="login-area">
            <h3 style="text-align:center; color:var(--navy)">Data Diri Peserta</h3>
            <input type="text" id="user-name" placeholder="Ketik Nama Lengkap Anda..." style="width:100%; padding:18px; text-align:center; border-radius:12px; border:2px solid #ddd; margin-bottom:20px; font-size:16px;">
            <button class="btn-main" onclick="startTest()">Mulai Assessment Sekarang</button>
        </div>

        <div id="quiz-area" style="display:none">
            <div style="display:flex; justify-content:space-between; font-size:12px; font-weight:bold; color:#888; margin-bottom:10px;">
                <span id="q-progress">Soal 1 / 100</span>
                <span style="color:var(--gold)">PERSONA.ESEARCH.ID</span>
            </div>
            
            <div class="q-card" id="q-text">Memuat pertanyaan...</div>
            
            <div class="opt-grid">
                <button class="btn-opt" id="btn-ya" onclick="recordAnswer('YA')">YA</button>
                <button class="btn-opt" id="btn-tidak" onclick="recordAnswer('TIDAK')">TIDAK</button>
            </div>

            <div class="nav-container">
                <div style="font-size: 11px; margin-bottom: 10px; font-weight: bold; color: #666;">NAVIGASI NOMOR:</div>
                <div class="nav-grid" id="nav-grid"></div>
            </div>

            <button class="btn-main" style="background:var(--navy); color:white; margin-top:25px;" onclick="validateFinish()">Selesai & Kirim Jawaban</button>
        </div>

        <div id="result-area" style="display:none">
            <div style="text-align:center; margin-bottom:20px;">
                <h3 id="report-title" style="margin:0; color:var(--navy); font-size:1.4em;">LAPORAN HASIL EVALUASI</h3>
                <p id="report-date" style="font-size:12px; color:#666;"></p>
            </div>

            <table class="res-table">
                <thead>
                    <tr><th>Aspek Kepribadian</th><th>Skor</th><th>Keterangan</th></tr>
                </thead>
                <tbody id="res-table-body"></tbody>
            </table>

            <div id="res-badge"></div>

            <div class="interpretasi-box">
                <h4>📖 Cara Membaca Hasil Kamu:</h4>
                <div id="narrative-text"></div>
            </div>

            <button class="btn-main" onclick="window.print()">Download Laporan (PDF / Print)</button>
            <button class="btn-main" style="background:#eee; color:#666;" onclick="location.reload()">Kembali ke Beranda</button>
        </div>
    </div>
</div>

<script>
    const questions = [
        {q:"Apakah Anda sering merasa ingin cepat-cepat menyelesaikan sesuatu?"},
        {q:"Apakah Anda termasuk orang yang banyak bicara?"},
        {q:"Apakah Anda sering merasa khawatir akan hal-hal yang belum terjadi?"},
        {q:"Apakah Anda pernah mengambil barang milik orang lain (meski sekecil peniti)?"},
        {q:"Apakah Anda merasa bahagia jika melihat orang yang Anda benci gagal?"},
        {q:"Apakah Anda mudah merasa tersinggung oleh ucapan teman?"},
        {q:"Apakah Anda lebih suka bekerja sendiri daripada dalam tim?"},
        {q:"Apakah Anda selalu menepati janji, apa pun rintangannya?"},
        {q:"Apakah Anda sering merasa bosan dengan rutinitas yang itu-itu saja?"},
        {q:"Apakah Anda pernah merasa benci pada orang tua Anda?"},
        {q:"Apakah Anda merasa tegang saat harus berbicara dengan atasan?"},
        {q:"Apakah Anda suka melakukan hal-hal yang menantang bahaya?"},
        {q:"Apakah Anda pernah berpura-pura sakit untuk menghindari tugas?"},
        {q:"Apakah Anda sering merasa sulit tidur karena memikirkan masalah?"},
        {q:"Apakah Anda merasa puas jika bisa membalas dendam?"},
        {q:"Apakah Anda tipe orang yang mudah bergaul di lingkungan baru?"},
        {q:"Apakah Anda pernah berbohong untuk menyelamatkan diri sendiri?"},
        {q:"Apakah Anda sering merasa lelah tanpa alasan yang jelas?"},
        {q:"Apakah Anda setuju bahwa aturan dibuat untuk dilanggar dalam keadaan darurat?"},
        {q:"Apakah Anda sering merasa kesepian meskipun berada di tengah keramaian?"},
        {q:"Apakah Anda selalu mencuci tangan sebelum makan tanpa kecuali?"},
        {q:"Apakah Anda lebih suka merencanakan sesuatu daripada langsung bertindak?"},
        {q:"Apakah Anda merasa sulit untuk memaafkan orang yang mengkhianati Anda?"},
        {q:"Apakah Anda sering merasa grogi saat menjadi pusat perhatian?"},
        {q:"Apakah Anda pernah merasa sangat marah hingga merusak barang?"},
        {q:"Apakah Anda suka mengikuti kegiatan organisasi atau komunitas?"},
        {q:"Apakah Anda selalu jujur dalam setiap perkataan Anda?"},
        {q:"Apakah Anda sering merasa nasib Anda lebih buruk dari orang lain?"},
        {q:"Apakah Anda menikmati perdebatan yang sengit?"},
        {q:"Apakah Anda sering merasa cemas jika pekerjaan belum selesai sempurna?"},
        {q:"Apakah Anda pernah membicarakan kejelekan teman di belakangnya?"},
        {q:"Apakah Anda merasa nyaman memimpin sebuah kelompok?"},
        {q:"Apakah Anda sering merasa sedih tanpa alasan yang pasti?"},
        {q:"Apakah Anda pernah melanggar lampu lalu lintas saat jalanan sepi?"},
        {q:"Apakah Anda suka menolong orang lain meskipun Anda sedang repot?"},
        {q:"Apakah Anda sering merasa terburu-buru dalam melakukan aktivitas?"},
        {q:"Apakah Anda merasa sulit untuk menahan emosi saat dikritik?"},
        {q:"Apakah Anda lebih suka membaca buku daripada pergi ke pesta?"},
        {q:"Apakah Anda pernah merasa ingin meninggalkan rumah selamanya?"},
        {q:"Apakah Anda selalu membuang sampah pada tempatnya tanpa kecuali?"},
        {q:"Apakah Anda sering meragukan kemampuan diri sendiri?"},
        {q:"Apakah Anda suka mencoba makanan yang belum pernah Anda kenal?"},
        {q:"Apakah Anda merasa senang jika diperintah oleh orang yang lebih muda?"},
        {q:"Apakah Anda sering merasa bahwa orang lain tidak mengerti Anda?"},
        {q:"Apakah Anda pernah datang terlambat ke suatu pertemuan?"},
        {q:"Apakah Anda termasuk orang yang ceria dan penuh semangat?"},
        {q:"Apakah Anda sering merasa pusing jika menghadapi tekanan berat?"},
        {q:"Apakah Anda setuju bahwa kekerasan kadang diperlukan untuk mendidik?"},
        {q:"Apakah Anda selalu berdoa setiap kali memulai aktivitas?"},
        {q:"Apakah Anda sering merasa sulit untuk berkonsentrasi?"},
        {q:"Apakah Anda suka membuat orang lain tertawa dengan lelucon Anda?"},
        {q:"Apakah Anda pernah merasa iri dengan keberhasilan teman dekat?"},
        {q:"Apakah Anda merasa yakin bisa mengendalikan diri dalam situasi konflik?"},
        {q:"Apakah Anda sering merasa ingin tahu urusan pribadi orang lain?"},
        {q:"Apakah Anda pernah berpikir untuk mengakhiri hidup saat menghadapi masalah besar?"},
        {q:"Apakah Anda senang berteman dengan siapa saja tanpa membedakan status?"},
        {q:"Apakah Anda selalu merapikan tempat tidur setelah bangun?"},
        {q:"Apakah Anda sering merasa jantung berdebar kencang saat menunggu giliran?"},
        {q:"Apakah Anda suka melakukan pekerjaan yang membutuhkan ketelitian tinggi?"},
        {q:"Apakah Anda pernah mengambil keuntungan dari kelemahan orang lain?"},
        {q:"Apakah Anda termasuk orang yang mudah percaya pada janji orang lain?"},
        {q:"Apakah Anda sering merasa tidak puas dengan hasil kerja Anda sendiri?"},
        {q:"Apakah Anda lebih suka diam saat terjadi perdebatan?"},
        {q:"Apakah Anda pernah meminjam uang dan lupa mengembalikannya?"},
        {q:"Apakah Anda merasa berani membela kebenaran meskipun berisiko?"},
        {q:"Apakah Anda sering merasa gelisah jika harus tinggal di rumah sendirian?"},
        {q:"Apakah Anda suka menonton pertandingan olahraga yang keras (misal: tinju)?"},
        {q:"Apakah Anda selalu menghargai pendapat orang lain meskipun berbeda?"},
        {q:"Apakah Anda pernah berkata kasar pada orang yang lebih tua?"},
        {q:"Apakah Anda sering merasa bangga dengan pencapaian Anda?"},
        {q:"Apakah Anda mudah merasa bosan jika harus duduk diam dalam waktu lama?"},
        {q:"Apakah Anda sering merasa curiga terhadap niat baik orang lain?"},
        {q:"Apakah Anda merasa sanggup bekerja di bawah pengawasan ketat?"},
        {q:"Apakah Anda pernah merasa ingin memukul orang yang menjengkelkan?"},
        {q:"Apakah Anda termasuk orang yang rapi dalam menyusun berkas?"},
        {q:"Apakah Anda sering merasa takut akan masa depan Anda?"},
        {q:"Apakah Anda suka mengambil risiko demi mendapatkan sesuatu yang besar?"},
        {q:"Apakah Anda selalu menaati instruksi pimpinan tanpa membantah?"},
        {q:"Apakah Anda pernah membuang surat atau pesan tanpa membacanya?"},
        {q:"Apakah Anda merasa mudah untuk memulai percakapan dengan orang asing?"},
        {q:"Apakah Anda sering merasa suasana hati Anda berubah secara tiba-tiba?"},
        {q:"Apakah Anda setuju bahwa kejujuran adalah segalanya dalam bekerja?"},
        {q:"Apakah Anda pernah merasa tidak dipedulikan oleh lingkungan Anda?"},
        {q:"Apakah Anda suka melakukan sesuatu secara mendadak/spontan?"},
        {q:"Apakah Anda selalu bersikap sopan kepada siapa pun?"},
        {q:"Apakah Anda sering merasa menyesal setelah melakukan sesuatu?"},
        {q:"Apakah Anda merasa lebih produktif bekerja pada malam hari?"},
        {q:"Apakah Anda pernah menertawakan orang yang sedang kesusahan?"},
        {q:"Apakah Anda merasa siap ditempatkan di mana saja di seluruh Indonesia?"},
        {q:"Apakah Anda sering merasa gemetar saat harus menghadapi ujian?"},
        {q:"Apakah Anda suka membantu pekerjaan rumah tangga tanpa diminta?"},
        {q:"Apakah Anda pernah merasa ingin memiliki kekuatan untuk balas dendam?"},
        {q:"Apakah Anda termasuk orang yang sabar saat mengantre panjang?"},
        {q:"Apakah Anda sering merasa bingung menentukan pilihan hidup?"},
        {q:"Apakah Anda selalu membayar hutang tepat pada waktunya?"},
        {q:"Apakah Anda suka berpetualang ke tempat yang terpencil?"},
        {q:"Apakah Anda merasa sulit untuk mengakui kesalahan Anda?"},
        {q:"Apakah Anda sering merasa bahwa hidup ini tidak adil?"},
        {q:"Apakah Anda selalu menjaga rahasia yang dipercayakan kepada Anda?"},
        {q:"Apakah Anda merasa yakin bahwa Anda akan lulus seleksi ini?"}
    ];

    const keys = {
        E: [2, 9, 16, 26, 32, 42, 46, 51, 56, 70, 71, 77, 80, 84, 96],
        N: [3, 6, 11, 14, 18, 20, 24, 28, 30, 33, 41, 44, 47, 50, 58, 62, 66, 76, 81, 83, 86, 90, 94, 98],
        P: [5, 12, 15, 19, 23, 25, 29, 37, 39, 48, 52, 54, 55, 60, 67, 69, 72, 74, 88, 92, 97],
        L: [4, 8, 13, 17, 21, 27, 31, 34, 35, 40, 45, 49, 57, 59, 64, 68, 78, 79, 82, 85, 91, 93, 95, 99]
    };

    let current = 0;
    let userAnswers = new Array(100).fill(null);

    function startTest() {
        const name = document.getElementById('user-name').value.trim();
        if(!name) return alert("Silakan isi nama lengkap Anda.");
        document.getElementById('login-area').style.display = 'none';
        document.getElementById('quiz-area').style.display = 'block';
        initNav();
        render();
    }

    function initNav() {
        const grid = document.getElementById('nav-grid');
        grid.innerHTML = '';
        for(let i=0; i<100; i++) {
            let item = document.createElement('div');
            item.className = 'nav-item';
            item.id = 'nav-' + i;
            item.innerText = i + 1;
            item.onclick = () => { current = i; render(); };
            grid.appendChild(item);
        }
    }

    function render() {
        document.getElementById('q-text').innerText = questions[current].q;
        document.getElementById('q-progress').innerText = `Soal ${current + 1} / 100`;
        
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        document.getElementById('nav-' + current).classList.add('active');

        document.getElementById('btn-ya').className = 'btn-opt' + (userAnswers[current] === 'YA' ? ' selected' : '');
        document.getElementById('btn-tidak').className = 'btn-opt' + (userAnswers[current] === 'TIDAK' ? ' selected' : '');
    }

    function recordAnswer(val) {
        userAnswers[current] = val;
        document.getElementById('nav-' + current).classList.add('filled');
        if(current < 99) { current++; render(); } else { render(); }
    }

    function validateFinish() {
        const empty = userAnswers.filter(a => a === null).length;
        if(empty > 0) return alert(`Masih ada ${empty} soal yang belum dijawab.`);
        calculate();
    }

    function calculate() {
        document.getElementById('quiz-area').style.display = 'none';
        document.getElementById('result-area').style.display = 'block';
        document.getElementById('report-date').innerText = "Waktu Selesai: " + new Date().toLocaleString();

        let sc = { E:0, N:0, P:0, L:0 };
        for(let t in keys) keys[t].forEach(idx => { if(userAnswers[idx-1] === 'YA') sc[t]++; });

        const labels = {
            E: sc.E > 15 ? "Sangat Aktif" : (sc.E >= 10 ? "Seimbang" : "Cenderung Pasif"),
            N: sc.N > 15 ? "Kurang Stabil" : "Stabil",
            P: sc.P > 14 ? "Keras" : "Normal",
            L: sc.L > 12 ? "Tidak Valid" : "Valid (Jujur)"
        };

        document.getElementById('res-table-body').innerHTML = `
            <tr><td style="text-align:left"><b>Extraversion (E)</b></td><td>${sc.E}</td><td>${labels.E}</td></tr>
            <tr><td style="text-align:left"><b>Neuroticism (N)</b></td><td>${sc.N}</td><td>${labels.N}</td></tr>
            <tr><td style="text-align:left"><b>Psychoticism (P)</b></td><td>${sc.P}</td><td>${labels.P}</td></tr>
            <tr><td style="text-align:left"><b>Lie Scale (L)</b></td><td>${sc.L}</td><td>${labels.L}</td></tr>
        `;

        const b = document.getElementById('res-badge');
        if(sc.L > 12) { b.innerText = "HASIL TIDAK VALID"; b.className = "badge invalid"; }
        else if(sc.N > 15) { b.innerText = "BELUM MEMENUHI STANDAR"; b.className = "badge tms"; }
        else { b.innerText = "MEMENUHI STANDAR"; b.className = "badge ms"; }

        document.getElementById('narrative-text').innerHTML = `
            <p><b>1. Gaya Bergaul (E):</b> Mengukur seberapa aktif kamu. Skor tinggi (${sc.E}) berarti kamu orang yang ceria, suka bergaul, dan penuh semangat. Skor rendah berarti kamu lebih tenang.</p>
            <p><b>2. Ketenangan Hati (N):</b> Mengukur kestabilan emosi. Di seleksi Polri, skor ini <b>tidak boleh lebih dari 15</b>. Skor kamu adalah <b>${sc.N}</b>. Jika terlalu tinggi, tandanya kamu mudah cemas saat ada tekanan.</p>
            <p><b>3. Kepedulian Sosial (P):</b> Mengukur kepedulian sosial. Skor yang normal menunjukkan kamu bisa mengikuti aturan dan punya rasa empati.</p>
            <p><b>4. Skala Kejujuran (L):</b> Mengukur kejujuran jawaban. Di seleksi Polri, skor ini <b>tidak boleh lebih dari 12</b>. Skor kamu <b>${sc.L}</b> menunjukkan sejauh mana kamu menjawab dengan apa adanya tanpa dibuat-buat.</p>
        `;
    }
</script>
</body>
</html>
